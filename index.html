<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Markdown을 유튜브 영상용 미니멀 슬라이드로 변환하는 웹앱" />
  <title>MD Slide — Markdown Presenter</title>
  <link rel="icon" type="image/svg+xml"
    href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='80' height='60' x='10' y='20' rx='8' fill='%237c6aff'/%3E%3Cpath d='M30 45h40M30 55h25' stroke='%23fff' stroke-width='4' stroke-linecap='round'/%3E%3C/svg%3E" />
</head>

<body>
  <div id="app">
    <!-- Toolbar -->
    <header class="toolbar" id="toolbar">
      <div class="toolbar-left">
        <div class="toolbar-logo">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round">
            <rect x="2" y="4" width="20" height="14" rx="3" />
            <line x1="6" y1="9" x2="14" y2="9" />
            <line x1="6" y1="13" x2="11" y2="13" />
          </svg>
          MD Slide
        </div>
        <button class="btn btn-primary" id="btn-new" title="새 슬라이드 템플릿 불러오기"
          style="margin-left: 12px; font-size: 0.8rem; padding: 6px 12px;">
          ✨ 새 슬라이드
        </button>
        <div class="docs-dropdown-container" id="docs-dropdown-container" style="position: relative;">
          <button class="btn btn-ghost" id="btn-docs" title="문서함 열기">
            📂 문서함
          </button>
          <div class="docs-menu" id="docs-menu">
            <!-- 동적으로 문서 목록 렌더링 -->
          </div>
        </div>
        <div class="toolbar-divider"></div>
        <button class="btn btn-ghost" id="btn-import" title="마크다운 파일 가져오기">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
            <polyline points="7 10 12 15 17 10" />
            <line x1="12" y1="15" x2="12" y2="3" />
          </svg>
        </button>
        <button class="btn btn-ghost" id="btn-export" title="마크다운 파일 내보내기 (Ctrl+S)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
            <polyline points="17 8 12 3 7 8" />
            <line x1="12" y1="3" x2="12" y2="15" />
          </svg>
        </button>
      </div>
      <div class="toolbar-right">
        <select class="theme-select" id="theme-select" title="테마 선택">
          <option value="midnight">🌙 Midnight</option>
          <option value="paper">📄 Paper</option>
          <option value="terminal">💻 Terminal</option>
          <option value="abyss">⬛ Abyss</option>
        </select>
        <button class="btn btn-ghost" id="btn-layout" title="레이아웃 전환: 좌상단 / 가운데 정렬">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2" />
            <line x1="9" y1="9" x2="15" y2="9" />
            <line x1="10" y1="13" x2="14" y2="13" />
          </svg>
          <span>가운데</span>
        </button>
        <button class="btn btn-primary" id="btn-present" title="슬라이드쇼 시작 (Ctrl+Enter)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round">
            <polygon points="5 3 19 12 5 21 5 3" />
          </svg>
          <span>슬라이드쇼</span>
        </button>
      </div>
    </header>

    <!-- Main Editor Area -->
    <main class="editor-container" id="editor-container">
      <!-- Left: Markdown Editor -->
      <section class="editor-panel" id="editor-panel">
        <div class="panel-header">
          <span class="panel-title">Markdown</span>
          <div class="panel-actions">
            <button class="btn-icon" id="btn-image" title="그림 추가 (Drag & Drop 지원)">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
                <circle cx="8.5" cy="8.5" r="1.5" />
                <polyline points="21 15 16 10 5 21" />
              </svg>
            </button>
            <button class="btn-icon" id="btn-cover" title="커버 페이지 슬라이드 삽입">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 20v-8" />
                <path d="M8 12l4-4 4 4" />
                <rect x="4" y="4" width="16" height="16" rx="2" ry="2" />
              </svg>
            </button>
            <div class="toc-dropdown" id="toc-dropdown">
              <button class="btn-icon" id="btn-toc" title="넘버링/목차 슬라이드 삽입">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"
                  stroke-linecap="round" stroke-linejoin="round">
                  <line x1="8" y1="6" x2="21" y2="6" />
                  <line x1="8" y1="12" x2="21" y2="12" />
                  <line x1="8" y1="18" x2="21" y2="18" />
                  <line x1="3" y1="6" x2="3.01" y2="6" />
                  <line x1="3" y1="12" x2="3.01" y2="12" />
                  <line x1="3" y1="18" x2="3.01" y2="18" />
                </svg>
              </button>
              <div class="toc-dropdown-menu" id="toc-menu">
                <button class="toc-menu-item" data-toc="vertical">📋 목차 (세로)</button>
                <button class="toc-menu-item" data-toc="horizontal">📋 목차 (가로)</button>
              </div>
            </div>
            <button class="btn-icon" id="btn-clear" title="전체 내용 삭제">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <polyline points="3 6 5 6 21 6" />
                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
              </svg>
            </button>
          </div>
        </div>
        <textarea class="markdown-editor" id="markdown-editor"
          placeholder="여기에 Markdown을 입력하세요...&#10;&#10;--- 로 슬라이드를 구분합니다." spellcheck="false"></textarea>
      </section>

      <!-- Right: Preview -->
      <section class="preview-panel" id="preview-panel">
        <div class="panel-header">
          <span class="panel-title">미리보기</span>
          <span class="panel-title" id="slide-count-label" style="font-size:11px; opacity:0.6;"></span>
        </div>
        <div class="preview-content" id="preview-content"></div>
      </section>
    </main>

    <!-- Status Bar -->
    <footer class="status-bar" id="status-bar">
      <div class="status-item">
        <span class="status-dot"></span>
        <span id="status-text">준비 완료</span>
      </div>
      <div class="status-item">
        <span id="char-count">0자</span>
      </div>
    </footer>
  </div>

  <!-- Hidden file input for import -->
  <input type="file" id="file-input" accept=".md,.txt,.markdown" style="display:none" />

  <!-- Version History Modal -->
  <div class="modal-overlay" id="history-modal">
    <div class="modal-container">
      <div class="modal-header">
        <h2 class="modal-title">버전 기록 및 복구</h2>
        <button class="btn-close-modal" id="btn-close-modal">&times;</button>
      </div>
      <div class="modal-body">
        <div class="history-sidebar">
          <div class="history-list" id="modal-history-list">
            <!-- Items injected by JS -->
          </div>
        </div>
        <div class="history-preview">
          <div class="preview-header">미리보기</div>
          <div class="preview-body" id="modal-history-preview">
            <div class="empty-msg">버전을 선택하여 내용을 확인하세요</div>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" id="btn-modal-cancel">취소</button>
        <button class="btn btn-primary" id="btn-modal-restore" disabled>이 버전으로 복원</button>
      </div>
    </div>
  </div>

  <!-- Toast Notifications -->
  <div id="toast-container" class="toast-container"></div>

  <script type="module" src="/src/main.js"></script>
</body>

</html>
